<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Recogidas Pendientes</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="pedidos-body">

<div class="pedido-container">

    <h1>🏪 Recogidas pendientes</h1>

    <div id="recogidasPendientes"></div>

    <h2 class="titulo-guardados">
        ✅ Pedidos guardados
    </h2>

    <div id="pedidosFinalizados"></div>

</div>

<script>

/* ======================
   MOSTRAR RECOGIDAS
====================== */

function mostrarRecogidas() {

    const contenedor =
        document.getElementById(
            "recogidasPendientes"
        );

    const recogidas =
        JSON.parse(
            localStorage.getItem(
                "recogidas-pendientes"
            )
        ) || [];

    contenedor.innerHTML = "";

    recogidas.forEach((pedido, index) => {

        contenedor.innerHTML += `

            <div class="pedido-guardado">

                <div class="pedido-top">

                    <h3>
                        📦 ${pedido.cliente}
                    </h3>

                    <button
                        class="btn-ready"
                        onclick="marcarRecogido(${index})">

                        ✅ Recogido

                    </button>

                </div>

                ${pedido.productos.map(p => `

                    <p>
                        ${p.nombre}
                        x${p.cantidad}
                    </p>

                `).join("")}

            </div>

        `;
    });
}

/* ======================
   MARCAR RECOGIDO
====================== */

function marcarRecogido(index) {

    const recogidas =
        JSON.parse(
            localStorage.getItem(
                "recogidas-pendientes"
            )
        ) || [];

    const finalizados =
        JSON.parse(
            localStorage.getItem(
                "pedidos-finalizados"
            )
        ) || [];

    finalizados.push(recogidas[index]);

    recogidas.splice(index, 1);

    localStorage.setItem(
        "recogidas-pendientes",
        JSON.stringify(recogidas)
    );

    localStorage.setItem(
        "pedidos-finalizados",
        JSON.stringify(finalizados)
    );

    mostrarRecogidas();

    mostrarFinalizados();
}

/* ======================
   MOSTRAR FINALIZADOS
====================== */

function mostrarFinalizados() {

    const contenedor =
        document.getElementById(
            "pedidosFinalizados"
        );

    const finalizados =
        JSON.parse(
            localStorage.getItem(
                "pedidos-finalizados"
            )
        ) || [];

    contenedor.innerHTML = "";

    finalizados.forEach(pedido => {

        contenedor.innerHTML += `

            <div class="pedido-finalizado">

                <h3>
                    ✅ ${pedido.cliente}
                </h3>

                ${pedido.productos.map(p => `

                    <p>
                        ${p.nombre}
                        x${p.cantidad}
                    </p>

                `).join("")}

            </div>

        `;
    });
}

mostrarRecogidas();

mostrarFinalizados();

</script>

</body>

</html>
