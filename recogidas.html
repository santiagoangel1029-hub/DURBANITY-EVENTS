<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Recogidas</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="pedidos-body">

    <div class="pedido-container">

        <h1>🏪 Pedidos de Recogidas</h1>

        <div class="cliente-box">

            <input
                type="text"
                id="cliente"
                placeholder="Nombre del cliente"
            >

        </div>

        <div id="catalogoPedidos"
             class="grid-pedidos">

        </div>

        <div class="guardar-box">

            <button onclick="guardarPedido()">
                💾 Guardar pedido
            </button>

        </div>

        <h2 class="titulo-guardados">
            Pedidos guardados
        </h2>

        <div id="pedidosGuardados"></div>

    </div>

<script>

let productos = [];

let pedidoActual = [];

fetch("productos.json")
    .then(res => res.json())
    .then(data => {

        productos = data;

        renderCatalogo();

    });

function renderCatalogo() {

    const catalogo =
        document.getElementById("catalogoPedidos");

    catalogo.innerHTML = "";

    productos.forEach(p => {

        catalogo.innerHTML += `

            <div class="pedido-producto">

                <img src="${p.imagen}">

                <h3>${p.nombre}</h3>

                <input
                    type="number"
                    min="1"
                    value="1"
                    id="cantidad-${p.nombre}"
                >

                <button
                    onclick="agregarProducto('${p.nombre}')">

                    Añadir

                </button>

            </div>

        `;
    });
}

function agregarProducto(nombre) {

    const input =
        document.getElementById(
            `cantidad-${nombre}`
        );

    const cantidad =
        parseInt(input.value) || 1;

    pedidoActual.push({

        nombre,
        cantidad

    });

    alert(nombre + " añadido");
}

function guardarPedido() {

    const cliente =
        document.getElementById("cliente").value;

    if (!cliente) {

        alert("Escribe nombre cliente");

        return;
    }

    if (pedidoActual.length === 0) {

        alert("No hay productos");

        return;
    }

    const pedidos =
        JSON.parse(
            localStorage.getItem(
                "pedidos-recogidas"
            )
        ) || [];

    pedidos.push({

        cliente,
        productos: pedidoActual

    });

    localStorage.setItem(
        "pedidos-recogidas",
        JSON.stringify(pedidos)
    );

    pedidoActual = [];

    document.getElementById("cliente").value = "";

    mostrarPedidos();

    alert("Pedido guardado");
}

function mostrarPedidos() {

    const contenedor =
        document.getElementById(
            "pedidosGuardados"
        );

    const pedidos =
        JSON.parse(
            localStorage.getItem(
                "pedidos-recogidas"
            )
        ) || [];

    contenedor.innerHTML = "";

    pedidos.forEach((pedido, index) => {

        contenedor.innerHTML += `

            <div class="pedido-guardado">

                <div class="pedido-top">

                    <h3>
                        📦 ${pedido.cliente}
                    </h3>

                    <button
                        class="btn-delete"
                        onclick="eliminarPedido(${index})">

                        ✖

                    </button>

                </div>

                ${pedido.productos.map(p => `

                    <p>
                        ${p.nombre}
                        x${p.cantidad}
                    </p>

                `).join("")}

            </div>

        `;
    });
}

function eliminarPedido(index) {

    const pedidos =
        JSON.parse(
            localStorage.getItem(
                "pedidos-recogidas"
            )
        ) || [];

    pedidos.splice(index, 1);

    localStorage.setItem(
        "pedidos-recogidas",
        JSON.stringify(pedidos)
    );

    mostrarPedidos();
}

mostrarPedidos();

</script>

</body>

</html>
