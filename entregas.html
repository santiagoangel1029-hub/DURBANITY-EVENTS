<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entregas</title>
<link rel="stylesheet" href="style.css">

<style>
.oculto{ display:none; }
</style>

</head>

<body class="pedidos-body">

<div class="pedido-container">

<h1>🚚 Entregas</h1>

<!-- PASO 1 -->
<div id="paso1">

<h2>1. Seleccionar productos</h2>

<div class="search-wrapper">

    <button class="search-toggle" onclick="toggleSearch()">🔍</button>

    <div class="search-box active" id="searchBox">

        <input id="buscador" placeholder="Buscar productos..." autocomplete="off">

        <div id="sugerencias" class="sugerencias"></div>

    </div>

</div>

<!-- aquí se ven productos añadidos -->
<div id="seleccionados"></div>

<button onclick="irPaso2()" class="btn-main">
Aceptar productos
</button>

</div>

<!-- PASO 2 -->
<div id="paso2" class="oculto">

<h2>2. Datos del cliente</h2>

<input id="cliente" placeholder="Cliente">
<input id="dirEntrega" placeholder="Dirección de entrega">
<input id="dirRecogida" placeholder="Dirección de recogida">

<input id="fechaEntrega" type="datetime-local">
<input id="fechaRecogida" type="datetime-local">

<button onclick="irPaso3()" class="btn-main">
Continuar
</button>

</div>

<!-- PASO 3 -->
<div id="paso3" class="oculto">

<h2>3. Confirmar pedido</h2>

<p>Revisa la información antes de guardar</p>

<button onclick="guardarPedido()" class="btn-main">
Realizar pedido
</button>

</div>

<hr>

<h2>Entregas pendientes</h2>

<div id="lista"></div>

</div>

<script src="entregas.js"></script>

</body>

</html>
