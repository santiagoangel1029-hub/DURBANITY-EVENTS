<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entregas</title>

<link rel="stylesheet" href="style.css">

<style>
.oculto { display:none; }

.panel{
    background:white;
    padding:15px;
    border-radius:15px;
    margin-top:15px;
}

.sugerencias{
    position:absolute;
    width:100%;
    background:white;
    top:65px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    z-index:999;
    display:none;
    max-height:250px;
    overflow-y:auto;
}

.sugerencia-item{
    padding:12px;
    cursor:pointer;
}

.sugerencia-item:hover{
    background:#f2f2f2;
}

.qty{
    width:70px;
    margin:10px 0;
}
</style>

</head>

<body>

<div class="pedido-container">

<h1>🚚 Entregas</h1>

<!-- PASO 1 -->
<div id="paso1">

<h2>1. Seleccionar productos</h2>

<div class="search-wrapper">

    <button class="search-toggle" onclick="toggleSearch()">🔍</button>

    <div class="search-box" id="searchBox">

        <input id="buscador" placeholder="Buscar productos..." autocomplete="off">

        <div id="sugerencias" class="sugerencias"></div>

    </div>
</div>

<!-- PRODUCTO SELECCIONADO -->
<div id="seleccionActual" class="panel oculto"></div>

<!-- LISTA -->
<h3>Pedido actual</h3>
<div id="seleccionados"></div>

<button id="btnAceptar" class="btn-main oculto" onclick="irPaso2()">
Aceptar
</button>

</div>

<!-- PASO 2 -->
<div id="paso2" class="oculto">

<h2>2. Datos del cliente</h2>

<input id="cliente" placeholder="Cliente">
<input id="dirEntrega" placeholder="Dirección de entrega">
<input id="dirRecogida" placeholder="Dirección de recogida">
<input id="fechaEntrega" type="datetime-local">
<input id="fechaRecogida" type="datetime-local">

<button class="btn-main" onclick="guardarPedido()">
Realizar pedido
</button>

</div>

<!-- ENTREGAS -->
<button class="btn-main" onclick="toggleEntregas()" style="margin-top:20px;">
Entregas pendientes
</button>

<div id="entregasPanel" class="panel oculto"></div>

</div>

<script src="entregas.js"></script>

</body>
</html>
