<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Entregas Pendientes</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="pedidos-body">

<div class="pedido-container">

    <h1>🚚 Entregas pendientes</h1>

    <!-- CLIENTE -->

    <div class="cliente-box">

        <input
            type="text"
            id="cliente"
            placeholder="Nombre del cliente"
        >

    </div>

    <!-- CATÁLOGO -->

    <div id="catalogoPedidos"
         class="grid-pedidos">

    </div>

    <!-- BOTÓN -->

    <div class="guardar-box">

        <button onclick="guardarPedido()">
            💾 Guardar pedido
        </button>

    </div>

    <!-- LISTA -->

    <div id="entregasPendientes"></div>

</div>

<script>

let productos = [];

let pedidoActual = [];

/* ======================
   CARGAR PRODUCTOS
====================== */

fetch("productos.json")
.then(res => res.json())
.then(data => {

    productos = data;

    renderCatalogo();

});

/* ======================
   CATÁLOGO
====================== */

function renderCatalogo() {

    const catalogo =
        document.getElementById(
            "catalogoPedidos"
        );

    catalogo.innerHTML = "";

    productos.forEach(p => {

        catalogo.innerHTML += `

            <div class="pedido-producto">

                <img src="${p.imagen}">

                <h3>${p.nombre}</h3>

                <input
                    type="number"
                    min="1"
                    value="1"
                    id="cantidad-${p.nombre}"
                >

                <button
                    onclick="agregarProducto('${p.nombre}')">

                    Añadir

                </button>

            </div>

        `;
    });
}

/* ======================
   AGREGAR PRODUCTO
====================== */

function agregarProducto(nombre) {

    const cantidad =
        parseInt(
            document.getElementById(
                `cantidad-${nombre}`
            ).value
        ) || 1;

    pedidoActual.push({

        nombre,
        cantidad

    });

    alert(nombre + " añadido");
}

/* ======================
   GUARDAR PEDIDO
====================== */

function guardarPedido() {

    const cliente =
        document.getElementById("cliente").value;

    if (!cliente) {

        alert("Escribe cliente");

        return;
    }

    if (pedidoActual.length === 0) {

        alert("No hay productos");

        return;
    }

    const entregas =
        JSON.parse(
            localStorage.getItem(
                "entregas-pendientes"
            )
        ) || [];

    entregas.push({

        cliente,
        productos: pedidoActual

    });

    localStorage.setItem(
        "entregas-pendientes",
        JSON.stringify(entregas)
    );

    pedidoActual = [];

    document.getElementById("cliente").value = "";

    mostrarEntregas();

    alert("Pedido guardado");
}

/* ======================
   MOSTRAR ENTREGAS
====================== */

function mostrarEntregas() {

    const contenedor =
        document.getElementById(
            "entregasPendientes"
        );

    const entregas =
        JSON.parse(
            localStorage.getItem(
                "entregas-pendientes"
            )
        ) || [];

    contenedor.innerHTML = "";

    entregas.forEach((pedido, index) => {

        contenedor.innerHTML += `

            <div class="pedido-guardado">

                <div class="pedido-top">

                    <h3>
                        📦 ${pedido.cliente}
                    </h3>

                    <button
                        class="btn-ready"
                        onclick="marcarEntregado(${index})">

                        ✅ Entregado

                    </button>

                </div>

                ${pedido.productos.map(p => `

                    <p>
                        ${p.nombre}
                        x${p.cantidad}
                    </p>

                `).join("")}

            </div>

        `;
    });
}

/* ======================
   ENTREGADO
====================== */

function marcarEntregado(index) {

    const entregas =
        JSON.parse(
            localStorage.getItem(
                "entregas-pendientes"
            )
        ) || [];

    const recogidas =
        JSON.parse(
            localStorage.getItem(
                "recogidas-pendientes"
            )
        ) || [];

    recogidas.push(entregas[index]);

    entregas.splice(index, 1);

    localStorage.setItem(
        "entregas-pendientes",
        JSON.stringify(entregas)
    );

    localStorage.setItem(
        "recogidas-pendientes",
        JSON.stringify(recogidas)
    );

    mostrarEntregas();
}

mostrarEntregas();

</script>

</body>

</html>
