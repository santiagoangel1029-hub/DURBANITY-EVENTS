<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Durbanity Events</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HERO SECTION -->

    <section class="hero">

        <div class="overlay"></div>

        <div class="hero-content">

            <img src="imagenes/logo.png" class="logo">

            <h1>
                Elegancia para tus eventos
            </h1>

            <p>
                Mantelería, menaje y decoración premium
            </p>

            <button onclick="scrollCatalogo()">
                Ver catálogo
            </button>

        </div>

    </section>

    <!-- HEADER -->

    <header class="header">

        <h2>
            Nuestro catálogo
        </h2>

        <div class="menu-productos">

            <button class="btn-main" onclick="toggleMenu()">
                Productos ▾
            </button>

            <div class="dropdown" id="dropdownMenu">

                <button onclick="filtrar('manteleria-estampada')">
                    Mantelería estampada
                </button>

                <button onclick="filtrar('manteleria-lisa')">
                    Mantelería lisa
                </button>

                <button onclick="filtrar('servilletas')">
                    Servilletas
                </button>

                <button onclick="filtrar('menaje')">
                    Menaje
                </button>

                <button onclick="filtrar('mobiliario')">
                    Mobiliario
                </button>

            </div>

        </div>

    </header>

    <!-- BUSCADOR -->

<div class="search-wrapper">

    <!-- ICONO LUPA -->
    <button class="search-toggle" onclick="toggleSearch()">
        🔍
    </button>

    <!-- BUSCADOR -->
    <div class="search-box" id="searchBox">

        <input
            type="text"
            id="buscador"
            placeholder="Buscar productos..."
            autocomplete="off"
        >

        <!-- SUGERENCIAS -->
        <div id="sugerencias" class="sugerencias"></div>

    </div>

</div>

    <!-- CATÁLOGO -->

    <div id="contenedor" class="grid"></div>

    <script src="app.js"></script>

</body>

</html>
