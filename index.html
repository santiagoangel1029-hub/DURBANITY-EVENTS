<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Durbanity - Catálogo</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ======================
         HEADER / MARCA
    ======================= -->

    <header class="header">

        <!-- TÍTULO -->
        <h1>DURBANITY EVENTS</h1>

        <!-- LÍNEAS -->
        <div class="lineas"></div>

        <!-- BARRA SUPERIOR -->
        <div class="top-bar">

            <!-- TEXTO IZQUIERDA -->
            <h2 class="subtitulo-left">
                Nuestro catálogo:
            </h2>

            <!-- MENÚ PRODUCTOS -->
            <div class="menu-productos">

                <button class="btn-main" onclick="toggleMenu()">
                    Productos ▾
                </button>

                <!-- MENÚ DESPLEGABLE -->
                <div class="dropdown" id="dropdownMenu">

                    <button onclick="filtrar('manteleria-estampada')">
                        Mantelería estampada
                    </button>

                    <button onclick="filtrar('manteleria-lisa')">
                        Mantelería lisa
                    </button>

                    <button onclick="filtrar('servilletas')">
                        Servilletas
                    </button>

                    <button onclick="filtrar('menaje')">
                        Menaje
                    </button>

                    <button onclick="filtrar('mobiliario')">
                        Mobiliario
                    </button>

                </div>

            </div>

        </div>

    </header>

    <!-- ======================
         BUSCADOR
    ======================= -->

    <div class="buscador-container">

        <input
            type="text"
            id="buscador"
            placeholder="Buscar producto..."
        >

    </div>

    <!-- ======================
         CATÁLOGO
    ======================= -->

    <div id="contenedor" class="grid"></div>

    <!-- ======================
         JAVASCRIPT
    ======================= -->

    <script src="app.js"></script>

</body>

</html>
